<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>英语背诵</title>
    <script>
      if (window.location.protocol === "file:") {
        window.location.replace("http://127.0.0.1:4173/");
      }
    </script>
    <meta name="theme-color" content="#f5f5f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="英语背诵" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css?v=20260621-cloud-library" />
  </head>
  <body>
    <noscript>
      <p style="padding: 16px; font-family: -apple-system, BlinkMacSystemFont, sans-serif;">
        请使用 http://127.0.0.1:4173/ 打开本网站。
      </p>
    </noscript>
    <main class="app-shell">
      <section class="workspace">
        <aside class="control-panel" aria-label="导入和录制控制">
          <div class="panel-section">
            <h2>导入文章</h2>
            <label class="file-drop" for="fileInput">
              <span class="file-icon">PDF / TXT</span>
              <strong>导入文章</strong>
              <small>PDF、TXT、字幕文件，或直接粘贴。</small>
              <input id="fileInput" type="file" accept=".pdf,.txt,.md,.srt,.vtt,text/plain,application/pdf,text/vtt" />
            </label>
            <div class="url-import">
              <input id="sourceUrl" type="url" placeholder="网页 / 字幕 / 视频链接" list="recentUrlOptions" />
              <button id="importUrlBtn">读取链接</button>
              <select id="recentUrlSelect" class="recent-url-select" aria-label="最近链接" hidden>
                <option value="">最近链接</option>
              </select>
              <datalist id="recentUrlOptions"></datalist>
            </div>
            <textarea id="pasteBox" placeholder="粘贴文章、字幕或中英交替文本。"></textarea>
            <div class="inline-actions">
              <button id="parseBtn" class="primary">生成稿</button>
              <button id="translateBtn">自动翻译</button>
            </div>
            <p id="importStatus" class="status" role="status"></p>
          </div>

          <div class="panel-section">
            <h2>显示设置</h2>
            <label class="toggle-row">
              <input id="compactToggle" type="checkbox" />
              <span>紧凑显示</span>
            </label>
          </div>

          <div class="panel-section library-section">
            <div class="section-title-row">
              <h2>文章库</h2>
              <span id="articleLibraryCount">0 篇</span>
            </div>
            <input id="articleSearch" type="search" placeholder="搜索文章" aria-label="搜索文章" />
            <div id="articleLibrary" class="article-library"></div>
          </div>

          <div class="panel-section stats-section">
            <h2>每日统计</h2>
            <p class="section-note">结束评分后自动更新。</p>
            <div class="data-tools" aria-label="背诵数据迁移">
              <button id="exportDataBtn" type="button">导出数据</button>
              <button id="importDataBtn" type="button">导入数据</button>
              <input id="dataImportInput" type="file" accept="application/json,.json" hidden />
            </div>
            <div id="dailyStatsList" class="daily-stats-list"></div>
          </div>

          <div class="panel-section cloud-section">
            <h2>云同步</h2>
            <p id="cloudStatus" class="section-note">正在准备云同步。</p>
            <div id="cloudSignedOut" class="cloud-auth">
              <div id="cloudEmailStep" class="cloud-step">
                <input id="cloudEmail" type="email" placeholder="邮箱登录同步" autocomplete="email" />
                <button id="cloudLoginBtn" type="button">发送验证码</button>
              </div>
              <div id="cloudOtpStep" class="cloud-step" hidden>
                <input
                  id="cloudOtp"
                  class="cloud-otp"
                  type="text"
                  inputmode="numeric"
                  autocomplete="one-time-code"
                  pattern="[0-9]*"
                  maxlength="10"
                  placeholder="输入邮箱验证码"
                  aria-label="邮箱验证码"
                />
                <button id="cloudVerifyBtn" class="primary" type="button" disabled>确认登录</button>
                <button id="cloudResendBtn" type="button">重新发送</button>
                <button id="cloudChangeEmailBtn" class="ghost" type="button">更换邮箱</button>
              </div>
            </div>
            <div id="cloudSignedIn" class="cloud-auth" hidden>
              <span id="cloudUserLabel"></span>
              <button id="cloudPullBtn" type="button">从云端恢复</button>
              <button id="cloudPushBtn" type="button">上传当前数据</button>
              <button id="cloudLogoutBtn" type="button">退出</button>
            </div>
          </div>

          <div class="panel-section record-section" id="recordSection">
            <h2>摄像头与录音</h2>
            <div class="device-grid">
              <label>
                <select id="cameraSelect" aria-label="摄像头"></select>
              </label>
              <label>
                <select id="micSelect" aria-label="麦克风"></select>
              </label>
            </div>
            <div class="record-tools">
              <button id="refreshDevicesBtn">刷新设备</button>
              <span>建议使用 Chrome、Edge 或 Safari。</span>
            </div>
            <div class="inline-actions">
              <a id="downloadLink" class="download-link" hidden>下载录像</a>
            </div>
            <textarea id="manualTranscript" class="manual-transcript" placeholder="语音识别不可用时，粘贴转写评分。"></textarea>
            <button id="scoreManualBtn">用文本评分</button>
            <p id="recordStatus" class="status" role="status"></p>
          </div>
        </aside>

        <section class="reader-panel" aria-label="文章和纠错结果">
          <div class="reader-toolbar">
            <div class="metric">
              <span id="sentenceCount">0</span>
              <small>句</small>
            </div>
            <div class="metric">
              <span id="wordCount">0</span>
              <small>词</small>
            </div>
          </div>

          <div class="live-strip">
            <span>实时转写</span>
            <p id="liveTranscript">等待开始背诵。</p>
          </div>

          <div id="articleList" class="article-list empty">
            <div class="empty-state">
              <h2>导入文章开始练习</h2>
              <p>逐句显示原文，背完后标出正确、漏背和多背的词。</p>
            </div>
          </div>
        </section>
      </section>
    </main>
    <section class="floating-controls" aria-label="常用背诵控制">
      <div class="floating-mode-controls" role="group" aria-label="隐藏选项">
        <button id="toggleEnglishBtn" type="button">隐英文</button>
        <button id="toggleChineseBtn" type="button">隐中文</button>
        <button id="hintTwoBtn" type="button">前两词</button>
      </div>
      <button id="floatingHintBtn">提示</button>
      <span id="floatingHintText" class="floating-hint-text">根据背诵位置提示</span>
      <button id="floatingCameraBtn">开摄像头</button>
      <button id="floatingRecordBtn" class="danger" disabled>开始</button>
      <button id="floatingStopBtn" disabled>结束</button>
      <button id="floatingExportBtn" type="button">备份</button>
    </section>
    <section id="floatingResult" class="floating-result" hidden>
      <div>
        <strong id="floatingRange">本次背诵结果</strong>
        <span id="floatingMeta">完成后显示句段、句数和准确率。</span>
        <small id="floatingTranscript">暂无转写。</small>
      </div>
      <button id="floatingJumpBtn">跳转</button>
    </section>
    <div id="replayDock" class="floating-replay-dock" hidden>
      <video id="replayVideo" class="floating-replay" controls playsinline></video>
      <button id="replayBackBtn" class="replay-back" type="button">后退 5 秒</button>
      <button id="openReplayBtn" class="replay-open" type="button">系统播放</button>
      <button id="deleteReplayBtn" class="replay-delete" type="button">删除录像</button>
    </div>
    <video id="cameraPreview" playsinline muted></video>

    <script type="module" src="./app.js?v=20260625-ipad-recording-save"></script>
  </body>
</html>
